name: Build plugin ZIP

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - setup.php
      - plugin.xml
      - tools/build_zip.py
      - .github/workflows/build.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ZIP artifact
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && 'self-hosted' || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: aidalinfo/plugin-time-glpi
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Check version gate
        id: version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import subprocess
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          VERSION_RE = re.compile(r"define\('PLUGIN_TIMETRACKER_VERSION', '([^']+)'\)")


          def setup_version(content: str) -> str:
              match = VERSION_RE.search(content)
              if match is None:
                  raise RuntimeError("Unable to read PLUGIN_TIMETRACKER_VERSION from setup.php")
              return match.group(1)


          def git_show(revision: str, path: str):
              result = subprocess.run(
                  ["git", "show", f"{revision}:{path}"],
                  check=False,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
              )
              if result.returncode != 0:
                  return None
              return result.stdout


          current = setup_version(Path("setup.php").read_text(encoding="utf-8"))
          xml_version = ET.parse("plugin.xml").getroot().findtext("version")
          if current != xml_version:
              print(f"Version mismatch: setup.php={current}, plugin.xml={xml_version}", file=sys.stderr)
              sys.exit(1)

          should_build = False
          reason = "version unchanged"
          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")

          if ref_type == "tag":
              expected_tag = f"v{current}"
              if ref_name != expected_tag:
                  print(f"Tag {ref_name} does not match plugin version {expected_tag}", file=sys.stderr)
                  sys.exit(1)
              should_build = True
              reason = f"tag {ref_name} matches plugin version"
          else:
              event = {}
              event_path = os.environ.get("GITHUB_EVENT_PATH")
              if event_path:
                  event = json.loads(Path(event_path).read_text(encoding="utf-8"))

              before = event.get("before")
              if before and before != "0" * 40:
                  previous_setup = git_show(before, "setup.php")
                  previous = setup_version(previous_setup) if previous_setup is not None else None
                  should_build = previous != current
                  reason = f"version changed from {previous} to {current}" if should_build else f"version remains {current}"
              else:
                  should_build = True
                  reason = f"initial build for version {current}"

          print(f"version={current}")
          print(f"should_build={str(should_build).lower()}")
          print(f"reason={reason}")
          PY

      - name: Skip build
        if: steps.version.outputs.should_build != 'true'
        shell: bash
        run: |
          echo "Skipping ZIP build: ${{ steps.version.outputs.reason }}"

      - name: Validate PHP syntax
        if: steps.version.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          php --version
          find setup.php hook.php front inc tools -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build plugin ZIP
        if: steps.version.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build_zip.py

      - name: Verify plugin ZIP
        if: steps.version.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/timetracker.zip
          python3 - <<'PY'
          from zipfile import ZipFile

          required = {
              "timetracker/setup.php",
              "timetracker/hook.php",
              "timetracker/plugin.xml",
              "timetracker/LICENSE",
              "timetracker/docs/INSTALLATION.md",
              "timetracker/inc/contractbudget.class.php",
              "timetracker/inc/timeentry.class.php",
              "timetracker/inc/dashboard.class.php",
          }

          with ZipFile("dist/timetracker.zip") as archive:
              names = set(archive.namelist())
              missing = sorted(required - names)
              forbidden = sorted(
                  name for name in names
                  if name.startswith(("timetracker/.git/", "timetracker/.github/", "timetracker/dist/", "timetracker/tools/"))
              )

          if missing:
              raise SystemExit(f"Missing files in ZIP: {missing}")
          if forbidden:
              raise SystemExit(f"Forbidden files in ZIP: {forbidden}")

          print("ZIP verification OK")
          PY

      - name: Upload artifact
        if: steps.version.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: timetracker-${{ steps.version.outputs.version }}
          path: dist/timetracker.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: steps.version.outputs.should_build == 'true' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          files: dist/timetracker.zip
          generate_release_notes: true
